apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: workshop
  labels:
    app: postgres
    tier: database
spec:
  serviceName: "postgres-service"
  replicas: 1                      # Assignment requires 1 pod for DB tier
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      # Ensure the pod restarts on the same node to reattach the PVC
      terminationGracePeriodSeconds: 30

      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres

          # ── Environment variables ────────────────────────────────────────
          env:
            - name: POSTGRES_DB
              value: "productdb"
            - name: POSTGRES_USER
              value: "apiuser"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          # ── Resource limits (FinOps best practice) ──────────────────────
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          # ── Volume mounts ────────────────────────────────────────────────
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata          # subPath prevents permission issues
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d

          # ── Health probes (self-healing) ─────────────────────────────────
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "apiuser", "-d", "productdb"]
            initialDelaySeconds: 30
            periodSeconds:       15
            failureThreshold:    5

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "apiuser", "-d", "productdb"]
            initialDelaySeconds: 10
            periodSeconds:       10
            failureThreshold:    3

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-script
          configMap:
            name: postgres-init-config
