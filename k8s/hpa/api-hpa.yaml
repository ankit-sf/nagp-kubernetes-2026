apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-api-hpa
  namespace: workshop
  labels:
    app: product-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-api

  minReplicas: 4                    # Assignment: always keep 4 minimum pods
  maxReplicas: 8                    # Scale up to 8 under heavy load

  metrics:
    # Scale when average CPU across pods exceeds 60%
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageValue
          averageUtilization: 60

    # Scale when average memory exceeds 70%
    - type: Resource
      resource:
        name: memory
        target:
          type:               AverageValue
          averageUtilization: 70

  behavior:
    # Scale up quickly when load spikes
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type:          Pods
          value:         2
          periodSeconds: 30
    # Scale down slowly to avoid thrashing
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 60
