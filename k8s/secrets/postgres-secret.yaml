apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: workshop
  labels:
    app: postgres
type: Opaque
# IMPORTANT: Replace these values with your own strong passwords before deploying. or from https://www.base64encode.org/
#   echo -n 'nagp@2026'  | base64  -> bmFncEAyMDI2
#
data:
  DB_PASSWORD:        bmFncEAyMDI2    # nagp@2026
  POSTGRES_PASSWORD:  bmFncEAyMDI2    # nagp@2026
