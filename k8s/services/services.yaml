# ── PostgreSQL Service (ClusterIP) ────────────────────────────────────────────
# Only accessible inside the cluster. Pods use DNS name "postgres-service"
# instead of pod IPs for inter-tier communication.
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: workshop
  labels:
    app: postgres
    tier: database
spec:
  type: ClusterIP                   # Not exposed outside cluster (assignment requirement)
  selector:
    app: postgres
  ports:
    - name:       postgres
      protocol:   TCP
      port:       5432
      targetPort: 5432

---
# ── Product API Service (ClusterIP) ───────────────────────────────────────────
# Ingress Controller routes external traffic here via LoadBalancer.
apiVersion: v1
kind: Service
metadata:
  name: product-api-service
  namespace: workshop
  labels:
    app: product-api
    tier: service
spec:
  type: ClusterIP
  selector:
    app: product-api
  ports:
    - name:       http
      protocol:   TCP
      port:       80
      targetPort: 3000
